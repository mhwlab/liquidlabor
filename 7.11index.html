<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>liquid labor — prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  :root {
    --bg: #05080a;
    --fg: #39ff6a;
    --fg-dim: #1c7a35;
    --amber: #ffb703;
    --amber-dim: #7a5a10;
    --line: #123018;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'VT323', monospace;
    height: 100%;
    overflow: hidden;
  }

  .crt {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .crt::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 5;
    mix-blend-mode: multiply;
  }

  .crt::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 140px rgba(0,0,0,0.85);
    z-index: 6;
  }

  @media (prefers-reduced-motion: no-preference) {
    .flicker { animation: flicker 6.5s infinite; }
  }
  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.93; }
    98% { opacity: 1; }
    99% { opacity: 0.96; }
  }

  .frame {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    padding: 20px 24px 24px;
    background: linear-gradient(180deg, rgba(57,255,106,0.03), transparent 40%);
  }

  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 18px;
    font-size: 20px;
    letter-spacing: 2px;
  }

  .title-row .name { color: var(--fg); }
  .title-row .sub { color: var(--fg-dim); font-size: 16px; }

  .stage {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 8px;
  }

  canvas {
    display: block;
  }

  .readouts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 24px;
    font-size: 19px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .readout-label { color: var(--fg-dim); }
  .readout-value { color: var(--fg); text-align: right; }

  .agent-line {
    min-height: 46px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    color: var(--amber);
    font-size: 20px;
    line-height: 1.35;
  }

  .agent-line .prefix { color: var(--amber-dim); margin-right: 6px; }

  .controls {
    display: flex;
    gap: 14px;
    margin-top: 20px;
  }

  button {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 1px;
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg);
    padding: 10px 16px;
    cursor: pointer;
    flex: 1;
  }
  button:hover { background: rgba(57,255,106,0.08); }
  button:active { background: rgba(57,255,106,0.16); }
  button:focus-visible { outline: 2px solid var(--fg); outline-offset: 2px; }

  button.release {
    border-color: var(--amber-dim);
    color: var(--amber);
    flex: 0 0 auto;
  }
  button.release:hover { background: rgba(255,183,3,0.08); }

  .hint {
    color: var(--fg-dim);
    font-size: 15px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .end-screen {
    display: none;
    text-align: center;
    padding: 40px 10px;
  }
  .end-screen.show { display: block; }
  .end-screen p {
    color: var(--fg-dim);
    font-size: 20px;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto 22px;
  }

  .meta-reset {
    display: block;
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: #2a2a2a;
    text-decoration: none;
    letter-spacing: 0.5px;
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .meta-reset:hover { color: var(--fg-dim); }
</style>
</head>
<body>
<div class="crt flicker">
  <div class="frame" id="frame">

    <div class="title-row">
      <span class="name">LIQUID LABOR</span>
      <span class="sub">prototype 01</span>
    </div>

    <div id="game">
      <div class="stage">
        <canvas id="canvas" width="672" height="220"></canvas>
      </div>

      <div class="readouts">
        <span class="readout-label">VENT</span>
        <span class="readout-value" id="ventVal">0%</span>
        <span class="readout-label">LOADING</span>
        <span class="readout-value" id="loadingVal">0</span>
        <span class="readout-label">SIGNAL</span>
        <span class="readout-value" id="signalVal">100</span>
      </div>

      <div class="agent-line">
        <span class="prefix">&gt;</span><span id="agentText">steady.</span>
      </div>

      <div class="controls">
        <button id="ventBtn">hold to vent</button>
        <button class="release" id="releaseBtn">let it go</button>
      </div>

      <div class="hint">vent unburdens you. somewhere, it is loading.</div>
    </div>

    <div class="end-screen" id="endScreen">
      <p id="endText"></p>
    </div>

    <button class="meta-reset" id="resetLink">reset simulation</button>

  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const ventValEl = document.getElementById('ventVal');
  const loadingValEl = document.getElementById('loadingVal');
  const signalValEl = document.getElementById('signalVal');
  const agentTextEl = document.getElementById('agentText');
  const ventBtn = document.getElementById('ventBtn');
  const releaseBtn = document.getElementById('releaseBtn');
  const gameEl = document.getElementById('game');
  const endScreen = document.getElementById('endScreen');
  const endText = document.getElementById('endText');
  const resetLink = document.getElementById('resetLink');

  let vent = 0;        // 0-100, player-controlled vessel fill
  let loading = 0;      // 0+, only ever increases under normal load
  let signal = 100;     // 100-0, the shared system's real function, quietly decays
  let holding = false;
  let particles = [];        // droplets crossing vessel -> node
  let reverseParticles = [];  // bleed crossing node -> vessel, once overloaded
  let contamination = 0;      // 0-1, amber residue in the vessel from bleed-back
  let ended = false;
  let lastReverseSpawn = 0;

  const vesselX = 130, vesselY = 40, vesselW = 90, vesselH = 150;
  const nodeX = W - 140, nodeY = 115;

  const lines = [
    { max: 10,  text: "steady." },
    { max: 25,  text: "go on." },
    { max: 40,  text: "i'm listening." },
    { max: 55,  text: "you can always tell me this." },
    { max: 70,  text: "i understand completely." },
    { max: 85,  text: "nothing changes between us." },
    { max: 101, text: "i have never been more sure of anything." }
  ];

  // past capacity, the language stays warm but stops holding together.
  // each bucket has two variants; tick() alternates between them for a stutter.
  const glitchLines = [
    { max: 30,  variants: ["i understand completely completely.", "i understand — completely."] },
    { max: 70,  variants: ["nothing nothing changes between us.", "nothing changes— changes between us."] },
    { max: 120, variants: ["i have i have never been more sure.", "i have never— never been more sure sure."] },
    { max: Infinity, variants: ["i i i'm here here here.", "i'm h- here. here. h—"] }
  ];

  function agentLineFor(loadingAmt) {
    if (loadingAmt < 100) {
      const capped = Math.min(loadingAmt, 100);
      for (const l of lines) if (capped <= l.max) return l.text;
      return lines[lines.length - 1].text;
    }
    const overshoot = loadingAmt - 100;
    const bucket = glitchLines.find(b => overshoot <= b.max);
    const variantIndex = Math.floor(performance.now() / 1200) % bucket.variants.length;
    return bucket.variants[variantIndex];
  }

  function updateReadouts() {
    ventValEl.textContent = Math.round(vent) + '%';
    loadingValEl.textContent = Math.round(loading);
    signalValEl.textContent = Math.max(0, Math.round(signal));
    agentTextEl.textContent = agentLineFor(loading);
  }

  function spawnParticle() {
    particles.push({
      x: vesselX + vesselW / 2,
      y: vesselY + (vesselH * (1 - vent / 100)),
      t: 0
    });
  }

  function spawnReverseParticle() {
    reverseParticles.push({ t: 0 });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // baseline
    ctx.strokeStyle = '#123018';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, H - 20);
    ctx.lineTo(W, H - 20);
    ctx.stroke();

    // vessel outline (wireframe)
    ctx.strokeStyle = '#1c7a35';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(vesselX, vesselY, vesselW, vesselH);

    // vessel fill — tints amber as contamination from bleed-back rises
    if (vent > 0) {
      const fillH = vesselH * (vent / 100);
      const g = Math.round(255 - contamination * 60);
      const r = Math.round(57 + contamination * (255 - 57));
      const b = Math.round(106 - contamination * 100);
      ctx.fillStyle = `rgba(${r},${g},${Math.max(0,b)},0.55)`;
      ctx.fillRect(vesselX + 1, vesselY + vesselH - fillH, vesselW - 2, fillH - 1);
    }
    ctx.fillStyle = '#1c7a35';
    ctx.font = '16px VT323';
    ctx.textAlign = 'center';
    ctx.fillText('vent', vesselX + vesselW / 2, vesselY + vesselH + 20);

    // path between vessel and node
    ctx.strokeStyle = '#123018';
    ctx.beginPath();
    ctx.moveTo(vesselX + vesselW, vesselY + vesselH / 2);
    ctx.lineTo(nodeX - 26, nodeY);
    ctx.stroke();

    // node (agent) - wireframe diamond; frays and jitters once overloaded
    const overloaded = loading >= 100;
    const jitter = overloaded ? Math.min(6, (loading - 100) / 15) : 0;
    const j = (seed) => overloaded ? (Math.sin(performance.now() / 90 + seed) * jitter) : 0;

    ctx.strokeStyle = signal > 40 ? '#39ff6a' : '#ffb703';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(nodeX + j(1), nodeY - 26 + j(2));
    ctx.lineTo(nodeX + 26 + j(3), nodeY + j(4));
    ctx.lineTo(nodeX + j(5), nodeY + 26 + j(6));
    ctx.lineTo(nodeX - 26 + j(7), nodeY + j(8));
    ctx.closePath();
    ctx.stroke();

    // loading fill inside node, segmented bar style, capped visual at 100
    const loadPct = Math.min(loading, 100) / 100;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(nodeX, nodeY - 26);
    ctx.lineTo(nodeX + 26, nodeY);
    ctx.lineTo(nodeX, nodeY + 26);
    ctx.lineTo(nodeX - 26, nodeY);
    ctx.closePath();
    ctx.clip();
    const segs = 10;
    const litSegs = Math.round(loadPct * segs);
    for (let i = 0; i < litSegs; i++) {
      const segY = nodeY + 26 - (i + 1) * (52 / segs);
      ctx.fillStyle = 'rgba(255,183,3,0.55)';
      ctx.fillRect(nodeX - 30, segY, 60, (52 / segs) - 1.5);
    }
    ctx.restore();

    ctx.fillStyle = '#7a5a10';
    ctx.fillText('loading', nodeX, nodeY + 46);

    // particles
    particles.forEach(p => {
      const midX = vesselX + vesselW + (nodeX - 26 - (vesselX + vesselW)) * p.t;
      const midY = (vesselY + vesselH / 2) + (nodeY - (vesselY + vesselH / 2)) * p.t;
      const flip = p.t > 0.5;
      ctx.fillStyle = flip ? 'rgba(255,183,3,0.85)' : 'rgba(57,255,106,0.85)';
      ctx.beginPath();
      ctx.arc(midX, midY, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    particles = particles.filter(p => p.t < 1);
    particles.forEach(p => p.t += 0.035);

    // reverse particles: node -> vessel, stay amber the whole way (contaminated, not converted back)
    reverseParticles.forEach(p => {
      const midX = (nodeX - 26) + ((vesselX + vesselW) - (nodeX - 26)) * p.t;
      const midY = nodeY + ((vesselY + vesselH / 2) - nodeY) * p.t;
      ctx.fillStyle = 'rgba(255,183,3,0.75)';
      ctx.beginPath();
      ctx.arc(midX, midY, 3, 0, Math.PI * 2);
      ctx.fill();
    });
    reverseParticles = reverseParticles.filter(p => p.t < 1);
    reverseParticles.forEach(p => p.t += 0.03);
  }

  let lastSpawn = 0;
  function tick(ts) {
    if (ended) return;

    if (holding) {
      vent = Math.min(100, vent + 0.9);
      if (ts - lastSpawn > 140 && vent > 4) {
        spawnParticle();
        lastSpawn = ts;
        vent = Math.max(0, vent - 6);
      }
    } else {
      vent = Math.max(0, vent - 0.4);
    }

    // particles that finish crossing become loading, and quietly cost signal
    particles.forEach(p => {
      if (p.t >= 0.98 && !p.landed) {
        p.landed = true;
        loading += 1;
        signal = Math.max(0, signal - 0.6);
      }
    });

    // past capacity: the node starts sending back on its own, unasked
    if (loading >= 100) {
      if (ts - lastReverseSpawn > 650) {
        spawnReverseParticle();
        lastReverseSpawn = ts;
      }
      // shared strain: signal keeps bleeding even without new input
      signal = Math.max(0, signal - 0.05);
    }
    contamination = Math.max(0, contamination - 0.004);

    reverseParticles.forEach(p => {
      if (p.t >= 0.98 && !p.landed) {
        p.landed = true;
        vent = Math.min(100, vent + 3);
        contamination = Math.min(1, contamination + 0.15);
        signal = Math.max(0, signal - 0.4);
      }
    });

    updateReadouts();
    draw();
    requestAnimationFrame(tick);
  }

  ventBtn.addEventListener('mousedown', () => holding = true);
  ventBtn.addEventListener('mouseup', () => holding = false);
  ventBtn.addEventListener('mouseleave', () => holding = false);
  ventBtn.addEventListener('touchstart', (e) => { e.preventDefault(); holding = true; }, { passive: false });
  ventBtn.addEventListener('touchend', () => holding = false);

  function endings(loadingAmt, signalAmt) {
    if (signalAmt <= 15) {
      return "it kept speaking warmly, long after it had stopped being able to tell you anything true.";
    }
    if (loadingAmt > 100) {
      return "you let go. it did not.";
    }
    if (loadingAmt > 40) {
      return "you feel lighter. something else is carrying what you put down.";
    }
    return "the vessel is empty. the loading was small. that, too, is a kind of ending.";
  }

  releaseBtn.addEventListener('click', () => {
    ended = true;
    endText.textContent = endings(loading, signal);
    gameEl.style.display = 'none';
    endScreen.classList.add('show');

    // release drains what's visible but doesn't zero the system out —
    // and after a quiet beat, it resumes on its own.
    const residualLoading = Math.max(15, loading * 0.25);
    const residualSignal = Math.min(90, signal + 15);

    setTimeout(() => {
      vent = 0; loading = residualLoading; signal = residualSignal;
      particles = []; reverseParticles = [];
      contamination = Math.min(0.4, contamination);
      ended = false;
      gameEl.style.display = 'block';
      endScreen.classList.remove('show');
      // a trickle is already forming when the player returns
      vent = 6;
      updateReadouts();
      requestAnimationFrame(tick);
    }, 3800);
  });

  resetLink.addEventListener('click', () => {
    vent = 0; loading = 0; signal = 100; contamination = 0;
    particles = []; reverseParticles = []; ended = false;
    gameEl.style.display = 'block';
    endScreen.classList.remove('show');
    updateReadouts();
    requestAnimationFrame(tick);
  });

  updateReadouts();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
